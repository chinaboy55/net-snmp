name: Build Net-SNMP for Windows

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装编译依赖
        shell: powershell
        run: |
          choco install -y winflexbison openssl strawberryperl

      - name: 安装 MSVC 编译工具链
        uses: microsoft/setup-msbuild@v2

      - name: 配置编译 (MSVC x64)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
          cd win32
          perl build.pl --config=Release --arch=x64 --dynamic

      - name: 编译
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
          cd win32
          nmake /f Makefile-apps.in

      - name: 收集编译产物
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path _output
          Copy-Item win32\bin\release\*.exe _output\
          Get-ChildItem _output

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: net-snmp-windows-x64
          path: _output/

name: Build Net-SNMP for Windows (MSYS2 + MinGW-w64)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:          # 手动触发

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}      # 所有 run 步骤默认用 MSYS2 shell

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: |
            make
            diffutils
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-openssl

      - name: Configure
        run: |
          ./configure \
            --host=x86_64-w64-mingw32 \
            --build=x86_64-w64-mingw32 \
            --with-endianness=little \
            --with-openssl=/mingw64 \
            --disable-embedded-perl \
            --without-perl-modules \
            --disable-agent

      - name: Make
        run: make -j$(nproc) LDFLAGS="-static"

      - name: Collect executables
        run: |
          mkdir -p dist
          # 静态链接后 exe 在 apps/ 目录下（不在 .libs/）
          for f in snmpget snmpset snmpwalk snmpbulkget snmpbulkwalk \
                   snmptrap snmptable snmptranslate snmpdelta snmpstatus \
                   snmpdf snmpping snmptest snmpusm snmpvacm snmpps \
                   snmpgetnext encode_keychange; do
            if [ -f apps/.libs/$f.exe ]; then
              cp apps/.libs/$f.exe dist/
            elif [ -f apps/$f.exe ]; then
              cp apps/$f.exe dist/
            fi
          done
          if [ -f apps/snmpnetstat/.libs/snmpnetstat.exe ]; then
            cp apps/snmpnetstat/.libs/snmpnetstat.exe dist/
          elif [ -f apps/snmpnetstat/snmpnetstat.exe ]; then
            cp apps/snmpnetstat/snmpnetstat.exe dist/
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: net-snmp-win64
          path: dist/

name: Build Net-SNMP for Windows

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 编译 (MSVC x64 Dynamic)
        shell: cmd
        run: |
          set BUILD=MSVCDYNAMIC64
          set "VCVARSPATH=C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build"
          ci\build.bat

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: net-snmp-windows-x64
          path: win32\bin\release\

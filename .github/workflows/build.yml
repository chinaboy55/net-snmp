name: Build Net-SNMP for Windows (MSYS2 + MinGW-w64)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:          # 手动触发

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}      # 所有 run 步骤默认用 MSYS2 shell

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: |
            make
            diffutils
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-openssl

      - name: Configure
        run: |
          ./configure \
            --host=x86_64-w64-mingw32 \
            --build=x86_64-w64-mingw32 \
            --with-endianness=little \
            --with-openssl=/mingw64 \
            --disable-embedded-perl \
            --without-perl-modules \
            --disable-agent

      - name: Make
        run: make -j$(nproc)

      - name: Collect executables
        run: |
          mkdir -p dist
          cp apps/.libs/snmpget.exe        dist/
          cp apps/.libs/snmpset.exe        dist/
          cp apps/.libs/snmpwalk.exe       dist/
          cp apps/.libs/snmpbulkget.exe    dist/
          cp apps/.libs/snmpbulkwalk.exe   dist/
          cp apps/.libs/snmptrap.exe       dist/
          cp apps/.libs/snmptable.exe      dist/
          cp apps/.libs/snmptranslate.exe  dist/
          cp apps/.libs/snmpdelta.exe      dist/
          cp apps/.libs/snmpstatus.exe     dist/
          cp apps/.libs/snmpdf.exe         dist/
          cp apps/.libs/snmpping.exe       dist/
          cp apps/.libs/snmptest.exe       dist/
          cp apps/.libs/snmpusm.exe        dist/
          cp apps/.libs/snmpvacm.exe       dist/
          cp apps/.libs/snmpps.exe         dist/
          cp apps/.libs/snmpgetnext.exe    dist/
          cp apps/.libs/encode_keychange.exe dist/
          cp apps/snmpnetstat/.libs/snmpnetstat.exe dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: net-snmp-win64
          path: dist/
